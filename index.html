<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="HK Space Shooting Game — a professional-grade canvas-based space shooter">
  <meta name="theme-color" content="#0a0a12">
  <title>HK Space Shooting Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="game.js" defer></script>
</head>
<body>

  <canvas id="gc"></canvas>

  <div id="ui">

    <!-- HUD -->
    <div class="hud" id="hud">
      <div class="hud-left">
        <div class="hud-panel">
          <div class="label">SCORE</div>
          <div class="value" id="scoreVal">0</div>
        </div>
        <div class="hud-panel">
          <div class="label">WAVE</div>
          <div class="value" id="waveVal">1</div>
        </div>
        <div class="hud-panel">
          <div class="label">KILLS</div>
          <div class="value" id="killsVal">0</div>
        </div>
      </div>
      <div class="hud-panel" style="text-align:right">
        <div class="label">HEALTH</div>
        <div class="health-bar">
          <div class="health-fill" id="healthFill" style="width:100%"></div>
        </div>
        <div class="shield-bar">
          <div class="shield-fill" id="shieldFill" style="width:0%"></div>
        </div>
      </div>
    </div>

    <!-- Pause Button -->
    <button id="pauseBtn" class="pause-btn" aria-label="Pause">⏸</button>

    <!-- Settings Button -->
    <button id="settingsBtn" class="settings-btn" aria-label="Settings">⚙</button>

    <!-- Settings Panel -->
    <div id="settingsPanel" class="settings-panel hidden">
      <div class="setting-row">
        <div class="setting-label">Sound</div>
        <div class="toggle on" id="soundToggle">
          <div class="toggle-knob"></div>
        </div>
      </div>
      <div class="setting-row">
        <div class="setting-label">Vibration</div>
        <div class="toggle on" id="vibrationToggle">
          <div class="toggle-knob"></div>
        </div>
      </div>
    </div>

    <!-- Combo Text -->
    <div class="combo" id="comboText"></div>

    <!-- Weapon Indicator -->
    <div class="weapon-ind" id="weaponInd"></div>

    <!-- Wave Announcement -->
    <div class="wave-announce" id="waveAnn"></div>

    <!-- Boss Warning -->
    <div class="boss-warning" id="bossWarning"></div>

    <!-- Screen Flash -->
    <div class="screen-flash" id="screenFlash"></div>

    <!-- Start Screen -->
    <div class="overlay show" id="startScreen">
      <div class="title">HK SPACE SHOOTING</div>
      <div class="subtitle">GAME</div>
      <div class="difficulty-select" id="difficultySelect">
        <button class="diff-btn active" data-diff="easy">EASY</button>
        <button class="diff-btn" data-diff="normal">NORMAL</button>
        <button class="diff-btn" data-diff="hard">HARD</button>
      </div>
      <div class="prompt">PRESS SPACE OR TAP TO START</div>
      <div class="controls-legend">WASD / ARROWS to move • MOUSE to aim • CLICK to shoot • ESC to pause<br>On mobile: Use joystick and fire button</div>
    </div>

    <!-- Pause Screen -->
    <div class="overlay" id="pauseScreen">
      <div class="pause-title">PAUSED</div>
      <div class="pause-stats">
        <div class="pause-stat">Score: <span id="pauseScore">0</span></div>
        <div class="pause-stat">Wave: <span id="pauseWave">1</span></div>
        <div class="pause-stat">Kills: <span id="pauseKills">0</span></div>
      </div>
      <div class="pause-menu">
        <button class="menu-btn resume" id="resumeBtn">▶ RESUME</button>
        <button class="menu-btn main-menu" id="mainMenuBtn">⌂ MAIN MENU</button>
        <button class="menu-btn quit" id="quitBtn">✕ QUIT</button>
      </div>
    </div>

    <!-- Game Over Screen -->
    <div class="overlay" id="gameOverScreen">
      <div class="game-over-title">GAME OVER</div>
      <div class="stat">Score: <span id="finalScore">0</span></div>
      <div class="stat">Wave: <span id="finalWave">1</span></div>
      <div class="stat">Kills: <span id="finalKills">0</span></div>
      <div class="stat">Best: <span id="bestScore">0</span></div>
      <button class="btn" id="restartBtn">PLAY AGAIN</button>
    </div>

    <!-- Mobile Controls -->
    <div id="mobileControls" class="mobile-controls">
      <div class="joystick-area" id="joystickArea">
        <div class="joystick-base" id="joystickBase">
          <div class="joystick-knob" id="joystickKnob"></div>
        </div>
      </div>
      <button class="weapon-switch-btn" id="weaponSwitchBtn">⚡</button>
      <button class="fire-btn" id="fireBtn">FIRE</button>
    </div>

  </div>

</body>
</html>
